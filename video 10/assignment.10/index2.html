<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video and Audio Categories</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎥 Video & 🎧 Audio Categories</h1>

<!-- MUSIC CATEGORY -->
<div class="category">
    <h2>🎵 Music</h2>
    <audio controls>
        <source src="music.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>
</div>

<!-- EDUCATION CATEGORY -->
<div class="category">
    <h2>📘 Education</h2>
    <iframe width="560" height="315"
        src="https://www.youtube.com/embed/HcOc7P5BMi4"
        title="HTML Tutorial"
        frameborder="0"
        allowfullscreen>
    </iframe>
</div>

<!-- ENTERTAINMENT CATEGORY -->
<div class="category">
    <h2>🎬 Entertainment</h2>
    <iframe width="560" height="315"
        src="https://www.youtube.com/embed/XZwBNDGuWGU"
        title="Entertainment Video"
        frameborder="0"
        allowfullscreen>
    </iframe>
</div>

<!-- MOTIVATION CATEGORY -->
<div class="category">
    <h2>🧘 Motivation</h2>
    <audio controls loop>
        <source src="motivation.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>
</div>

</body>
</html>
