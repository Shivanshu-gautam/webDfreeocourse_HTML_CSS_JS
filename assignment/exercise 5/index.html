 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        nav{
            color: aqua;
            background-color: rgb(234, 84, 84);
            height: 50px;
        }
        .container{
            background-color: green;
            
            border: 2px solid black;
            height: 300px;
            margin: 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
             
        }
        .box1{
            background-color: rgb(40, 119, 188);
            border: 1px solid yellow;
            height: 250px;
            width: 250px;
            margin: 0 20px;
             
        }
        .box2{
            background-color: rgb(214, 131, 29);
            border: 2px solid yellow;
            height: 250px;
            width: 250px;
            margin: 0 20px;
            
        }
        .main{
            background-color: black;
            min-height: 100vh;
        }
        .text-box{
            padding: 34px;
            border: 2px solid purple;
            margin: 10px 30vw;
            padding: 20px;
            border-radius: 100px;

 
        }
    .orangebox{
        height: 32px;
        width: 32px;
        background: orange;
        position: fixed;
        right: 23px;
        border-radius: 60px;
    }
    </style>
 </head>
 <body>
    <header>
        <nav>

        </nav>
    </header>
    <main>
        <div class="container">
            <div class="box1"></div>
            <div class="box2"></div>
        </div>
        <div class="text-box">
            <p>welcome to sigma web development express.</p>
        </div>
        <div class="orangebox"></div>

    </main>
    <footer>

    </footer>
    
 </body>
 </html>
