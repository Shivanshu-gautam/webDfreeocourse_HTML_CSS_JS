<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS selectors</title>
    <style>
        /* shows class and # shows ID selectors*/
        .Priya {
            background-color: black;
            color: pink;
        }
        #healer{
            background-color: blue;
            color: white;
        }
    </style>
</head>

<body>
    <!--class selector-->
    <!--if any user want not all div backgroud red so we can make class and ID-->
    <div class="Priya">
        Priya is so innocent girl.
    </div>
     
    <!--ID selector-->
    <div id="healer">
        solo leveling is good healer.
    </div>

</body>

</html>
