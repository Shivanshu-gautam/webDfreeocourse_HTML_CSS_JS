<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if you want to change pposition use position method.</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        .box {
            margin: 2px;
            padding: 33px;
            border: 3px solid purple;
        }

        
        .box1 {
            background-color: rgb(97, 99, 101);
            position: sticky;

        }

        .box2 {
            background-color: rgb(212, 97, 97);
        }

        .box3 {
            backgroun-color: rgb(84, 190, 46);
        }

        .box4 {
            background-color: bisque;
        }

        .parent {
            margin: 20px;
            padding: 40px;
            border: 10px solid black;

        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>

</html>
