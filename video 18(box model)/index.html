<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> CSS box model</title>
    <style>
        .box1 {
            background-color: red;
            color: yellow;
            padding: 10px;
            margin: 25px;
            border: 2px solid black;

        }

        /*here i give 25 margin in website destop between box1& box2 total margin may be 50 but by rule their only 25 show */
        .box2 {
            background-color: pink;
            color: black;
            padding: 10px;
            margin: 25px;
        }
    </style>
</head>

<body>
    <div class="box1">
        Heyy useing box model for box 1.
    </div>
    <div class="box2">
        I create diffrent box class for use diffrent properties for both boxes.
    </div>

</body>
