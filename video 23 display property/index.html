<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS diplay property</title>
    <style>
        <!-- universal selector:-->
        *{
            margin=0;
            padding: 0;

        }
        .box1{
            margin: 20px;
            padding: 35px;
            border: 20px solid blue;
            display: inline-block;
            width: 344px;
        }
        .box2{
            border: 20px solid red;
            margin: 20px;
            padding: 35px;
            display: inline-block;
            width: 544px;
    }
    span{
        display: none ;
        background-color: red;
        visibility: hidden;
    }
    img{
        width: 280px;
        display: block;
    }

    </style>
</head>
<body>
    <div class="box1">
        hii goojaar
    </div>
    <div class="box2">
        heyy that is a block.
    </div>
    <span>hii jaat</span>
    <img src="image.jpg.jpeg" alt="Shikhar">
    
</body>
</html>
